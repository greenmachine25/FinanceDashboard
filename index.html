<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceHub</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#2dd4bf">

    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            teal: '#2dd4bf',
                            blue: '#3b82f6'
                        }
                    },
                    animation: {
                        'pop-in': 'popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-down': 'slideDown 0.3s ease-out forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95) translateY(10px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
                        },
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        
        .gradient-text {
            background: linear-gradient(to right, #2dd4bf, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg {
            background: linear-gradient(to right, #2dd4bf, #3b82f6);
        }
        
        /* Smooth number updates */
        .value-update { transition: all 0.3s ease; }

        /* Hardware Acceleration for smooth animations */
        .animate-pop-in, .animate-slide-down, .animate-fade-in, .tab-content {
            will-change: transform, opacity;
        }

        /* Hide scrollbar for navbar but allow scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #aiContent p { margin-bottom: 0.75rem; }
        #aiContent ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        #aiContent li { margin-bottom: 0.5rem; }
        #aiContent strong { font-weight: 600; color: #1f2937; }
        .dark #aiContent strong { color: #f3f4f6; }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 min-h-screen font-sans antialiased">

    <!-- Navbar -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-20 transition-colors duration-300 relative">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-2 hover:scale-105 transition-transform duration-300 cursor-pointer">
                    <img src="icon.svg" alt="FinanceHub Logo" class="w-6 h-6 object-contain" onerror="this.outerHTML=`<i data-lucide='wallet' class='text-teal-400 w-6 h-6'></i>`; if(window.lucide) { lucide.createIcons(); }" />
                    <span class="text-xl font-bold tracking-tight"><span class="text-gray-900 dark:text-white">Finance</span><span class="gradient-text">Hub</span></span>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden sm:flex space-x-4" id="tabs-desktop">
                    <button onclick="switchTab('dashboard')" class="tab-btn active px-3 py-2 rounded-md text-sm font-medium text-brand-blue dark:text-brand-teal bg-blue-50 dark:bg-gray-700 transition-all duration-200 whitespace-nowrap">Dashboards</button>
                    <button onclick="switchTab('loan')" class="tab-btn px-3 py-2 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-300 dark:hover:text-white transition-all duration-200 whitespace-nowrap">Loans</button>
                    <button onclick="switchTab('interest')" class="tab-btn px-3 py-2 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-300 dark:hover:text-white transition-all duration-200 whitespace-nowrap">APY Savings</button>
                    <button onclick="switchTab('stocks')" class="tab-btn px-3 py-2 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-300 dark:hover:text-white transition-all duration-200 whitespace-nowrap">Stock Ideas</button>
                </div>

                <div class="flex items-center space-x-2 sm:space-x-1">
                    <button onclick="openSettingsModal()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-all duration-300" title="Data Settings">
                        <i data-lucide="settings" class="w-5 h-5 text-gray-600 dark:text-gray-300"></i>
                    </button>

                    <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 hover:rotate-12 transition-all duration-300">
                        <i data-lucide="moon" id="moonIcon" class="w-5 h-5 text-gray-600 dark:text-gray-300"></i>
                        <i data-lucide="sun" id="sunIcon" class="w-5 h-5 text-yellow-400 hidden"></i>
                    </button>
                    
                    <!-- Mobile Menu Toggle -->
                    <button onclick="toggleMobileMenu()" class="sm:hidden p-2 rounded-md text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all duration-200">
                        <i data-lucide="menu" id="mobileMenuIcon" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Dropdown Menu -->
        <div id="mobileMenu" class="hidden sm:hidden absolute w-full bg-white dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700 shadow-xl top-16 left-0 origin-top">
            <div class="px-4 py-3 flex flex-col space-y-2">
                <button onclick="switchTab('dashboard')" class="tab-btn active w-full text-left px-4 py-3 rounded-md text-base font-medium text-brand-blue dark:text-brand-teal bg-blue-50 dark:bg-gray-700 transition-all duration-200">Dashboards</button>
                <button onclick="switchTab('loan')" class="tab-btn w-full text-left px-4 py-3 rounded-md text-base font-medium text-gray-500 hover:text-gray-700 dark:text-gray-300 dark:hover:text-white transition-all duration-200">Loans</button>
                <button onclick="switchTab('interest')" class="tab-btn w-full text-left px-4 py-3 rounded-md text-base font-medium text-gray-500 hover:text-gray-700 dark:text-gray-300 dark:hover:text-white transition-all duration-200">APY Savings</button>
                <button onclick="switchTab('stocks')" class="tab-btn w-full text-left px-4 py-3 rounded-md text-base font-medium text-gray-500 hover:text-gray-700 dark:text-gray-300 dark:hover:text-white transition-all duration-200">Stock Ideas</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-[1400px] mx-auto px-3 sm:px-6 lg:px-8 py-6 sm:py-8 overflow-x-hidden">
        
        <!-- Tab: Dashboards -->
        <div id="dashboard" class="tab-content active">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 sm:gap-0">
                <h2 class="text-2xl font-bold">Budget Scenarios</h2>
                <button onclick="addDashboard()" class="w-full sm:w-auto justify-center bg-brand-teal hover:bg-teal-500 hover:-translate-y-0.5 hover:shadow-lg text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition-all duration-200 flex items-center">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i> New Scenario
                </button>
            </div>
            <div id="dashboardsContainer" class="grid grid-cols-1 xl:grid-cols-2 gap-4 sm:gap-8">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Tab: Loans -->
        <div id="loan" class="tab-content">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 sm:gap-0">
                <h2 class="text-2xl font-bold">Loan Scenarios</h2>
                <button onclick="addLoan()" class="w-full sm:w-auto justify-center bg-brand-teal hover:bg-teal-500 hover:-translate-y-0.5 hover:shadow-lg text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition-all duration-200 flex items-center">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i> New Scenario
                </button>
            </div>
            <div id="loansContainer" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Tab: Interest -->
        <div id="interest" class="tab-content">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 sm:gap-0">
                <h2 class="text-2xl font-bold">APY Scenarios</h2>
                <button onclick="addInvestment()" class="w-full sm:w-auto justify-center bg-brand-blue hover:bg-blue-500 hover:-translate-y-0.5 hover:shadow-lg text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition-all duration-200 flex items-center">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i> New Scenario
                </button>
            </div>
            <div id="interestContainer" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Tab: Stock Ideas -->
        <div id="stocks" class="tab-content">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 sm:gap-0">
                <h2 class="text-2xl font-bold">Live AI Stock Explorer</h2>
                <button onclick="fetchStockIdeas()" class="w-full sm:w-auto justify-center bg-indigo-500 hover:bg-indigo-600 hover:-translate-y-0.5 hover:shadow-lg text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition-all duration-200 flex items-center">
                    <i data-lucide="search" class="w-4 h-4 mr-2"></i> Scan Market
                </button>
            </div>
            <div id="stockContainer" class="bg-gray-50/50 dark:bg-gray-800/50 p-4 sm:p-6 rounded-2xl border border-gray-100 dark:border-gray-700 min-h-[300px]">
                <!-- Injected via JS -->
            </div>
        </div>

    </main>

    <!-- AI Insights Modal -->
    <div id="aiModal" class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0 p-4 sm:p-0">
        <div id="aiModalContent" class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-5 sm:p-6 w-full max-w-lg mx-auto border border-gray-100 dark:border-gray-700 relative scale-95 transition-transform duration-300 max-h-[90vh] flex flex-col">
            <button onclick="closeAIModal()" class="absolute top-4 right-4 text-gray-400 hover:text-rose-500 hover:rotate-90 transition-all duration-200">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <h3 class="text-xl font-bold mb-4 flex items-center gradient-text shrink-0">
                <i data-lucide="sparkles" class="w-5 h-5 mr-2 text-brand-blue animate-pulse"></i>
                AI Financial Insights
            </h3>
            <div id="aiContent" class="text-sm text-gray-700 dark:text-gray-300 overflow-y-auto pr-2 custom-scrollbar">
                <!-- AI response goes here -->
            </div>
        </div>
    </div>

    <!-- Data Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0 p-4 sm:p-0">
        <div id="settingsModalContent" class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-5 sm:p-6 w-full max-w-md mx-auto border border-gray-100 dark:border-gray-700 relative scale-95 transition-transform duration-300">
            <button onclick="closeSettingsModal()" class="absolute top-4 right-4 text-gray-400 hover:text-rose-500 hover:rotate-90 transition-all duration-200">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <h3 class="text-xl font-bold mb-4 flex items-center gradient-text">
                <i data-lucide="database" class="w-5 h-5 mr-2 text-brand-teal"></i>
                Data Backup & Sync
            </h3>
            
            <div class="space-y-4">
                <!-- File Backup -->
                <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-xl border border-gray-200 dark:border-gray-600">
                    <h4 class="text-sm font-bold mb-2">Local File Backup</h4>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mb-3">Download a .json file of your data to save safely on your device.</p>
                    <div class="flex space-x-2">
                        <button onclick="exportFile()" class="flex-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm py-2 rounded-lg transition-colors flex items-center justify-center font-medium shadow-sm"><i data-lucide="download" class="w-4 h-4 mr-2 text-brand-teal"></i> Export</button>
                        <label class="flex-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 text-sm py-2 rounded-lg transition-colors flex items-center justify-center font-medium shadow-sm cursor-pointer">
                            <i data-lucide="upload" class="w-4 h-4 mr-2 text-brand-blue"></i> Import
                            <input type="file" class="hidden" accept=".json" onchange="importFile(event)">
                        </label>
                    </div>
                </div>

                <!-- Code Sync -->
                <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-xl border border-gray-200 dark:border-gray-600">
                    <h4 class="text-sm font-bold mb-2">Sync Code</h4>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mb-3">Copy your data as a code snippet to easily paste on another device.</p>
                    <button onclick="exportCode()" class="w-full mb-3 bg-brand-blue hover:bg-blue-600 text-white text-sm py-2 rounded-lg transition-colors flex items-center justify-center font-bold shadow-md"><i data-lucide="copy" class="w-4 h-4 mr-2"></i> Copy Sync Code</button>
                    <div class="flex space-x-2">
                        <input type="text" id="importCodeInput" placeholder="Paste code here..." class="flex-1 p-2 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 outline-none focus:ring-2 focus:ring-brand-blue text-sm">
                        <button onclick="importCode()" class="bg-gray-800 dark:bg-white text-white dark:text-gray-900 px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-700 dark:hover:bg-gray-200 transition-colors shadow-sm">Load</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let appData = {
            theme: 'light',
            dashboards: [],
            loans: [],
            investments: [],
            lastStockIdeas: ''
        };

        const fmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
        const apiKey = ""; // Keep empty for standard environment runtime

        // --- Initialization & Cache ---
        function init() {
            const saved = localStorage.getItem('financeHubData');
            if (saved) {
                let parsed = JSON.parse(saved);
                if (!parsed.dashboards) {
                    parsed = {
                        theme: parsed.theme || 'light',
                        dashboards: [{ id: Date.now(), name: 'Primary Scenario', income: parsed.income?.weekly || 0, expenses: parsed.expenses || [] }],
                        loans: [{ id: Date.now()+1, name: 'Loan Scenario 1', amount: parsed.loan?.amount || 0, rate: parsed.loan?.rate || 0, years: parsed.loan?.years || 0 }],
                        investments: [{ id: Date.now()+2, name: 'Bank APY 1', principal: parsed.investment?.principal || 0, rate: parsed.investment?.rate || 0 }],
                        lastStockIdeas: ''
                    };
                }
                appData = parsed;
                if(appData.lastStockIdeas === undefined) appData.lastStockIdeas = '';
            } else {
                addDashboard(false);
                addLoan(false);
                addInvestment(false);
            }
            applyTheme(appData.theme);
            renderAll();
        }

        // --- Performance: Debounced Saving ---
        let saveTimeout;
        function saveData() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('financeHubData', JSON.stringify(appData));
            }, 500); // Saves 500ms after you stop typing to prevent lag
        }

        // --- Theme & Navigation ---
        document.getElementById('themeToggle').addEventListener('click', () => {
            appData.theme = appData.theme === 'light' ? 'dark' : 'light';
            applyTheme(appData.theme);
            saveData();
        });

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('moonIcon').classList.add('hidden');
                document.getElementById('sunIcon').classList.remove('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('moonIcon').classList.remove('hidden');
                document.getElementById('sunIcon').classList.add('hidden');
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('text-brand-blue', 'dark:text-brand-teal', 'bg-blue-50', 'dark:bg-gray-700', 'active');
                el.classList.add('text-gray-500', 'dark:text-gray-300');
            });
            document.getElementById(tabId).classList.add('active');
            
            // Update BOTH mobile and desktop buttons
            document.querySelectorAll(`button[onclick="switchTab('${tabId}')"]`).forEach(btn => {
                btn.classList.add('text-brand-blue', 'dark:text-brand-teal', 'bg-blue-50', 'dark:bg-gray-700', 'active');
                btn.classList.remove('text-gray-500', 'dark:text-gray-300');
            });

            const menu = document.getElementById('mobileMenu');
            if (menu && !menu.classList.contains('hidden')) {
                toggleMobileMenu();
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const icon = document.getElementById('mobileMenuIcon');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                menu.classList.add('animate-slide-down');
                icon.setAttribute('data-lucide', 'x');
            } else {
                menu.classList.add('hidden');
                menu.classList.remove('animate-slide-down');
                icon.setAttribute('data-lucide', 'menu');
            }
            lucide.createIcons();
        }

        function renderAll() {
            renderDashboards();
            renderLoans();
            renderInvestments();
            renderStocks();
        }

        // ==========================================
        // DATA MANAGEMENT (BACKUP / SYNC)
        // ==========================================
        function openSettingsModal() {
            const modal = document.getElementById('settingsModal');
            const content = document.getElementById('settingsModalContent');
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            });
        }

        function closeSettingsModal() {
            const modal = document.getElementById('settingsModal');
            const content = document.getElementById('settingsModalContent');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function exportFile() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `financehub_backup_${new Date().getTime()}.json`);
            document.body.appendChild(dlAnchorElem);
            dlAnchorElem.click();
            dlAnchorElem.remove();
        }

        function importFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (parsedData && parsedData.dashboards) {
                        appData = parsedData;
                        localStorage.setItem('financeHubData', JSON.stringify(appData));
                        init();
                        closeSettingsModal();
                        alert("Data successfully imported!");
                    } else {
                        alert("Invalid backup file format.");
                    }
                } catch (error) {
                    alert("Error reading backup file.");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        }

        function exportCode() {
            try {
                // btoa handles basic base64 encoding. encodeURIComponent handles special characters/emojis.
                const code = btoa(encodeURIComponent(JSON.stringify(appData)));
                navigator.clipboard.writeText(code).then(() => {
                    alert("Sync Code copied to clipboard! Paste this on your other device.");
                });
            } catch (error) {
                alert("Failed to generate code. Data might be too large.");
            }
        }

        function importCode() {
            const inputField = document.getElementById('importCodeInput');
            const code = inputField.value.trim();
            if (!code) return;
            
            try {
                const parsedData = JSON.parse(decodeURIComponent(atob(code)));
                if (parsedData && parsedData.dashboards) {
                    appData = parsedData;
                    localStorage.setItem('financeHubData', JSON.stringify(appData));
                    init();
                    closeSettingsModal();
                    inputField.value = '';
                    alert("Sync successful! Data loaded.");
                } else {
                    alert("Invalid Sync Code.");
                }
            } catch (error) {
                alert("Corrupted or Invalid Sync Code.");
            }
        }


        // ==========================================
        // DASHBOARDS (INCOME & EXPENSES)
        // ==========================================
        function addDashboard(save = true) {
            appData.dashboards.unshift({ id: Date.now(), name: `Budget Scenario ${appData.dashboards.length + 1}`, income: 0, expenses: [] });
            if (save) { saveData(); renderDashboards(); }
        }

        function removeDashboard(id) {
            const el = document.getElementById(`dash-${id}`);
            if(el) {
                el.classList.add('opacity-0', 'scale-95');
                setTimeout(() => {
                    appData.dashboards = appData.dashboards.filter(d => d.id !== id);
                    saveData();
                    renderDashboards();
                }, 200);
            }
        }

        function renderDashboards() {
            const container = document.getElementById('dashboardsContainer');
            container.innerHTML = appData.dashboards.map(dash => `
                <div id="dash-${dash.id}" class="animate-pop-in bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden relative group transition-all duration-300">
                    <button onclick="removeDashboard(${dash.id})" class="absolute top-4 right-4 text-gray-400 hover:text-rose-500 hover:rotate-90 transition-all duration-200 z-10"><i data-lucide="x" class="w-5 h-5"></i></button>
                    
                    <div class="p-4 sm:p-6 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50 transition-colors">
                        <input type="text" value="${dash.name}" oninput="updateDashName(${dash.id}, this.value)" class="text-lg sm:text-xl font-bold bg-transparent outline-none text-brand-teal w-10/12 sm:w-11/12 placeholder-gray-400 focus:border-b border-brand-teal transition-all" placeholder="Scenario Name">
                    </div>

                    <div class="p-4 sm:p-6 space-y-5 sm:space-y-6">
                        <div>
                            <label class="block text-xs sm:text-sm font-medium mb-1 transition-colors">Weekly Income (After Tax) $</label>
                            <input type="number" id="inc-${dash.id}" value="${dash.income || ''}" placeholder="0.00" oninput="calcDashboard(${dash.id})" class="w-full p-2 sm:p-3 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 outline-none focus:ring-2 focus:ring-brand-teal focus:border-transparent transition-all">
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-3 mt-3">

        function calcDashboard(dashId) {

            const incInput = document.getElementById(`inc-${dashId}`);
            d.income = parseFloat(incInput.value) || 0;

            const yInc = wInc * 52;
            const mInc = yInc / 12;
            const dInc = wInc / 7;

            document.getElementById(`d-day-${dashId}`).innerText = fmt.format(dInc);
            document.getElementById(`d-mo-${dashId}`).innerText = fmt.format(mInc);
            document.getElementById(`d-yr-${dashId}`).innerText = fmt.format(yInc);

            let yearlyExp = 0;
            d.expenses.forEach(e => {
                const amt = parseFloat(e.amount) || 0;
                if (e.freq === 'weekly') yearlyExp += amt * 52;
                if (e.freq === 'monthly') yearlyExp += amt * 12;
                if (e.freq === 'yearly') yearlyExp += amt;
            });

            const netYr = yInc - yearlyExp;
            const netMo = netYr / 12;
            const netWk = netYr / 52;
            
            document.getElementById(`net-wk-${dashId}`).innerText = fmt.format(netWk);
            document.getElementById(`net-mo-${dashId}`).innerText = fmt.format(netMo);

                    total = payment * n;
                }

            document.getElementById(`l-pay-${id}`).innerText = fmt.format(payment);
            document.getElementById(`l-tot-${id}`).innerText = fmt.format(total);
            document.getElementById(`l-int-${id}`).innerText = fmt.format(Math.max(0, total - P));

        // ==========================================

        async function callGemini(prompt, useGrounding = false, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "You are a helpful, encouraging financial advisor. Provide responses formatted cleanly using ONLY standard HTML tags like <p>, <ul>, <li>, <strong>, <a>, <h3>, <div>, <br>. Keep answers concise. Do NOT use Markdown formatting like **." }] }
            };

            if (useGrounding) {
                payload.tools = [{ "google_search": {} }];
            }

            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        async function runAIAnalysis(dashId) {
            const dash = appData.dashboards.find(d => d.id === dashId);
            if(!dash) return;

            openAIModal();
            const content = document.getElementById('aiContent');
            content.innerHTML = '<div class="flex flex-col items-center justify-center py-10"><i data-lucide="loader-2" class="w-10 h-10 animate-spin text-brand-teal mb-4"></i><span class="text-gray-500 dark:text-gray-400">Analyzing scenario...</span></div>';
            lucide.createIcons();

            const yInc = dash.income * 52;
            let expensesText = dash.expenses.map(e => `${e.name}: $${e.amount} (${e.freq})`).join(', ');
            if (!expensesText) expensesText = "No expenses listed.";

            const prompt = `Here is my financial snapshot for my scenario named "${dash.name}":
            Estimated Yearly Income: $${yInc.toFixed(2)}
            Current Expenses: ${expensesText}
            
            Please provide a brief, actionable 3-point summary analyzing my spending habits and giving me tips to optimize my savings. Keep it very concise.`;

            try {
                content.innerHTML = `<div class="animate-fade-in">${await callGemini(prompt)}</div>`;
            } catch (error) {
                content.innerHTML = `<div class="text-rose-500 p-4 bg-rose-50 dark:bg-gray-700 rounded-lg animate-fade-in">Failed to load AI insights. Please try again later.</div>`;
            }
        }

            content.innerHTML = '<div class="flex flex-col items-center justify-center py-10"><i data-lucide="loader-2" class="w-10 h-10 animate-spin text-brand-blue mb-4"></i><span class="text-gray-500 dark:text-gray-400">Evaluating yield strategy...</span></div>';
            lucide.createIcons();

            const prompt = `I have a scenario named "${inv.name}". I currently have $${(inv.principal || 0).toFixed(2)} in a bank account offering an APY of ${(inv.rate || 0)}%. 
            Can you give me a brief 3-point analysis of this rate in the current economic climate, and suggest what other low-risk or medium-risk vehicles I could use to diversify or improve my yield? Keep it concise.`;

            try {
                content.innerHTML = `<div class="animate-fade-in">${await callGemini(prompt)}</div>`;
            } catch (error) {
                content.innerHTML = `<div class="text-rose-500 p-4 bg-rose-50 dark:bg-gray-700 rounded-lg animate-fade-in">Failed to load AI insights. Please try again later.</div>`;
            }
        }

        // ==========================================
        // LIVE STOCK SCANNER
        // ==========================================
        async function fetchStockIdeas() {
            const container = document.getElementById('stockContainer');
            container.innerHTML = '<div class="flex flex-col items-center justify-center py-16"><i data-lucide="loader-2" class="w-12 h-12 animate-spin text-indigo-500 mb-4"></i><span class="text-gray-500 dark:text-gray-400 font-medium">Scanning live market news...</span><p class="text-xs text-gray-400 mt-2">This utilizes Google Search grounding to find today\'s data.</p></div>';
            lucide.createIcons();

            const prompt = `Search the live web for 3 trending stocks that financial analysts are highly recommending to buy this week.
            For each stock, provide:
            1. The company name and ticker symbol.
            2. A 2-sentence reasoning on why it's a good buy right now based on recent news.
            3. A real, clickable URL to a recent news article about it.
            
            Format the output strictly as a series of HTML cards exactly like this:
            <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm mb-4 border border-gray-100 dark:border-gray-700 hover:shadow-md transition-shadow">
                <h3 class="text-lg font-bold text-indigo-500 mb-2">Company Name (TICKER)</h3>
                <p class="text-sm text-gray-700 dark:text-gray-300 mb-3">Reasoning goes here...</p>
                <a href="URL_HERE" target="_blank" class="text-xs font-bold text-brand-teal hover:text-teal-600 hover:underline inline-flex items-center">Read Article &rarr;</a>
            </div>`;

            try {
                const response = await callGemini(prompt, true); 
                appData.lastStockIdeas = `<div class="animate-fade-in max-w-3xl mx-auto">${response}</div>`;
                saveData();
                renderStocks();
            } catch (error) {
                container.innerHTML = `<div class="text-rose-500 p-4 bg-rose-50 dark:bg-gray-700 rounded-lg animate-fade-in max-w-2xl mx-auto">Failed to scan live market data. Please try again later.</div>`;
            }
        }

        function renderStocks() {
            const container = document.getElementById('stockContainer');
            if (appData.lastStockIdeas && appData.lastStockIdeas.trim() !== '') {
                container.innerHTML = appData.lastStockIdeas;
            } else {
                 container.innerHTML = `
                    <div class="text-center text-gray-500 dark:text-gray-400 py-16 animate-fade-in">
                        <div class="bg-indigo-100 dark:bg-gray-800 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="trending-up" class="w-10 h-10 text-indigo-500"></i>
                        </div>
                        <p class="font-medium text-lg mb-1">Ready to explore?</p>
                        <p class="text-sm">Click "Scan Market" to have AI analyze live news and find trending stock ideas.</p>
                    </div>`;
            }
            lucide.createIcons();
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }

        // Boot
        init();

    </script>
</body>
</html>
